        }
 .container{
            display: flex;
    justify-content: center;

        }
 .slider {
     margin-top: -20px;
    position: relative;
    width: 100%;
    max-width: 1280px;
    overflow: hidden;
    border-radius: 30px;
    box-shadow: 0 8px 8px rgba(0, 0, 0, 0.2);
}
.slides {
    display: flex;
    height: 500px;
     
    transition: transform 0.5s ease-in-out;
} 
.img{
    min-width: 100%;
    transition:  0.5s ease;
}
.img img {
    width: 100%;
    display: block;
}
.nav{
    position: absolute;
    top: 50%;
    width: 100%;
    left: -0.5%;
    display: flex;
    justify-content: space-between;
    transform: translateY(-50%); 
    padding: 0 10px;
}
.nav button {
    background-color: rgba(8, 0, 0, 0.5);
    color: white;
    border: none;
    font-size: 25px;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    cursor: pointer;
}
.dots {
    display: flex;
    justify-content: center;
    /* margin: 20px; */
    margin-right: 50px;
    padding: 10px;
    height: 40px;
    /* width: 40px; */

}

.dot {

    cursor: pointer;
}
.pic{
    border-radius: 30px;
     margin-left: 30px;
     margin-right: 30px;
    height: 40px;
    width: 60px;
}
.dot.active {
     filter: brightness(40%);

}
  .me{

        <script>
               
const slides = document.querySelector('.slides');
const slide = document.querySelectorAll('.img');
const dots = document.querySelectorAll('.dot');
const prev = document.getElementById('prev');
const next = document.getElementById('next');
const downloadBtn = document.getElementById("downloadBtn");

let currentIndex = 0;

function updateSlider() { 
    slides.style.transform = `translateX(-${currentIndex *100}%)`;
    dots.forEach((dot, index) => {
        dot.classList.toggle('active', index === currentIndex);
    
        sliderImage.src = images[currentIndex].src;
    sliderImage.setAttribute("data-downlod",images[currentIndex].download);
    downloadBtn.href = images[currentIndex].download;
    });
}

next.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % slide.length;
    updateSlider();
});

prev.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + slide.length) % slide.length;
    updateSlider();
});

dots.forEach(dot => {
    dot.addEventListener('click', () => {
        currentIndex = parseInt(dot.dataset.index);
        updateSlider();
    });
});

updateSlider();
