    <style>
        body {

        .bar {
            height: 45px;

            background-color: rgb(16, 42, 77);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 40px;
            padding: 3px;
        }
        .name {
            margin-left: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, rgb(255, 0, 234), rgb(133, 76, 185), rgb(23, 23, 185));
            -webkit-background-clip : text;
            background-clip:content;
            -webkit-text-fill-color: transparent;
        }
        .m {
            margin-left: 60%;
            margin-bottom: 10px;
            
        }
        button{
            padding: 10px;
            color: #ffffff;
            background-color:  rgb(6, 42, 97);
            border-radius: 30px;
            text-decoration: none;
            height: 40px;
            width: 100px;
            margin: 5px;
        }
        .icon {
            height: 40px;
            width: 40px;
            margin-top: 10px;
            margin-right: 10px;
            border-radius: 20px;
            border: solid 4px rgb(120, 40, 196);
        }
        .container{
            border: solid 2px rgb(212, 222, 226);
            padding-top: 20px;
            margin-top:20px;
            background: #010622;
            padding-bottom: 20px;
         border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slider-container {
            width: 1000px;
            border-radius: 40px;
            height: 300px;
            overflow: hidden;
            border-radius: 50px;
            position: relative;
        }
        .slider {
            display: flex;
            border-radius: 40px;
            width: 1000px;
            height: 300px;
            animation: slide 20s infinite;
        } 
        @keyframes slide {
            0%, 10% { transform: translateX(-00%); } /*1*/
            10%, 20% { transform: translateX(-89%); }/*2*/
            20%, 30% { transform: translateX(-170%); }/*3*/
            30%, 40% { transform: translateX(-260%); }/*4*/
            40%, 50% { transform: translateX(-350%); }/*5*/
            50%, 60% { transform: translateX(-440%); }/*6*/
            60%, 70% { transform: translateX(-530%); }/*7*/
            70%, 80% { transform: translateX(-620%); }/*8*/
            80%, 100% { transform: translateX(-710%);} /*9*/
            100%, 00% { transform: translateX(00%);}/*10*/
        }
        .slider img {
            margin-left: 150px;
            margin-right: 150px;
            border-radius: 40px;
            width: 600px;
            height: 300px;
        }
        .img{
            border: solid 3px white;
            width: 300px;
            height: 200px; 
            border-radius: 40px;
            box-shadow: 10px 10px 3px rgb(6, 42, 97);
                  transition: transform 0.3s ease;
        }
        .img:hover{
            border: solid 5px white;
            transform: scale(1.13);
            box-shadow: 15px 15px 20px rgb(6, 42, 97);
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 290px); /* 5 columns */
            grid-template-rows: repeat(5,260px); /* 4 rows */
            gap: 50px; /* Space between grid items */
            padding: 10px;
            border-radius: 30px;
            width: 100%;
            margin-left: 40px;
            height:90vh;
        }
        .grid-item {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #00aaff;
            width: 250px;
            height: 150px;
            border-radius: 5px;
        }
        .grid{
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
             
        }
         
         
label{

input[type="file"] {

            border-radius: 30px;
            cursor: pointer;
            display: inline-block;
        }

        .upload-btn:hover {
            background-color: rgb(16, 52, 127);
        }
